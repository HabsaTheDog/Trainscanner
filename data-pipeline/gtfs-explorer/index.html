<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTFS Explorer — Interactive Filter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-glass: rgba(255, 255, 255, 0.04);
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 10px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 380px;
            height: 100vh;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px);
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ── File Upload ── */
        .upload-zone {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .drop-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-glass);
        }

        .drop-area:hover,
        .drop-area.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.08);
        }

        .drop-area .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .drop-area p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .drop-area small {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        input[type="file"] {
            display: none;
        }

        /* ── Stats ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
        }

        .stat {
            text-align: center;
            padding: 8px;
            background: var(--bg-glass);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stat .value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── Filter Controls ── */
        .filters {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-section h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filter-section h3 button {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 0.7rem;
            cursor: pointer;
            font-family: var(--font);
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 2px;
        }

        .filter-item:hover {
            background: var(--bg-glass);
        }

        .filter-item input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .filter-item .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .filter-item .name {
            flex: 1;
            font-size: 0.85rem;
        }

        .filter-item .count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        /* Search within filters */
        .filter-search {
            width: 100%;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.85rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.15s;
        }

        .filter-search:focus {
            border-color: var(--accent);
        }

        /* ── Action Bar ── */
        .action-bar {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        /* ── Map ── */
        .map-area {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .maplibregl-popup-content {
            background: var(--bg-card) !important;
            color: var(--text) !important;
            border: 1px solid var(--border) !important;
            border-radius: var(--radius) !important;
            padding: 12px !important;
            font-family: var(--font) !important;
            backdrop-filter: blur(16px);
        }

        .maplibregl-popup-tip {
            border-top-color: var(--bg-card) !important;
        }

        .popup-title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .popup-detail {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* ── Loading ── */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 100;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🚂 GTFS Explorer</h1>
            <p>Load, visualize & filter GTFS feeds</p>
        </div>

        <div class="upload-zone">
            <div class="drop-area" id="dropArea">
                <div class="icon">📂</div>
                <p>Drop a GTFS .zip file or folder here</p>
                <small>Or click to browse (accepts .zip or individual .txt files)</small>
            </div>
            <input type="file" id="fileInput" multiple accept=".zip,.txt,.csv">
        </div>

        <div class="stats-bar" id="statsBar" style="display:none">
            <div class="stat">
                <div class="value" id="statRoutes">0</div>
                <div class="label">Routes</div>
            </div>
            <div class="stat">
                <div class="value" id="statStops">0</div>
                <div class="label">Stops</div>
            </div>
            <div class="stat">
                <div class="value" id="statTrips">0</div>
                <div class="label">Trips</div>
            </div>
        </div>

        <div class="filters" id="filtersPanel" style="display:none">
            <!-- Route Type Filter -->
            <div class="filter-section" id="routeTypeSection">
                <h3>Route Types <button onclick="toggleAll('routeType', true)">All</button></h3>
                <div id="routeTypeFilters"></div>
            </div>

            <!-- Agency/Operator Filter -->
            <div class="filter-section" id="agencySection">
                <h3>Operators <button onclick="toggleAll('agency', true)">All</button></h3>
                <input class="filter-search" placeholder="Search operators..." id="agencySearch"
                    oninput="filterAgencyList()">
                <div id="agencyFilters"></div>
            </div>
        </div>

        <div class="action-bar" id="actionBar" style="display:none">
            <button class="btn btn-secondary" onclick="exportFilterConfig()">💾 Export Config</button>
            <button class="btn btn-primary" onclick="exportFilteredGTFS()">📦 Export Filtered</button>
        </div>
    </div>

    <div class="map-area">
        <div id="map"></div>
        <div class="loading-overlay hidden" id="loading">
            <div class="spinner"></div>
            <div style="color: var(--text-secondary); font-size: 0.9rem;" id="loadingText">Loading GTFS data...</div>
        </div>
    </div>

    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        // ============================================
        // GTFS Explorer — Interactive Filter Tool
        // ============================================

        // ── State ──
        let gtfsData = {
            routes: [],
            stops: [],
            trips: [],
            stopTimes: [],
            agencies: [],
            shapes: [],
        };

        let filters = {
            routeType: new Set(),
            agency: new Set(),
        };

        let allAgencies = [];

        // ── Route type definitions ──
        const ROUTE_TYPES = {
            0: { name: 'Tram/Straßenbahn', color: '#f59e0b', icon: '🚊' },
            1: { name: 'U-Bahn/Metro', color: '#ef4444', icon: '🚇' },
            2: { name: 'Eisenbahn/Rail', color: '#3b82f6', icon: '🚂' },
            3: { name: 'Bus', color: '#22c55e', icon: '🚌' },
            4: { name: 'Fähre/Ferry', color: '#06b6d4', icon: '⛴️' },
            5: { name: 'Seilbahn/Cable Car', color: '#8b5cf6', icon: '🚡' },
            6: { name: 'Gondel', color: '#a855f7', icon: '🚠' },
            7: { name: 'Standseilbahn', color: '#d946ef', icon: '🚞' },
            11: { name: 'Trolleybus', color: '#14b8a6', icon: '🚎' },
            12: { name: 'Einschienenbahn', color: '#f97316', icon: '🚝' },
            // Extended route types (100-series = rail subtypes)
            100: { name: 'Fernverkehr / IC', color: '#2563eb', icon: '🚄' },
            101: { name: 'ICE/TGV', color: '#1d4ed8', icon: '🚅' },
            102: { name: 'Fernverkehr', color: '#3b82f6', icon: '🚃' },
            103: { name: 'InterRegio', color: '#60a5fa', icon: '🚃' },
            105: { name: 'Nachtzug', color: '#6366f1', icon: '🌙' },
            106: { name: 'Regional Rail', color: '#7c3aed', icon: '🚈' },
            109: { name: 'S-Bahn', color: '#a78bfa', icon: '🚈' },
            400: { name: 'U-Bahn', color: '#ef4444', icon: '🚇' },
            700: { name: 'Bus', color: '#22c55e', icon: '🚌' },
            900: { name: 'Tram', color: '#f59e0b', icon: '🚊' },
            1000: { name: 'Schiff', color: '#06b6d4', icon: '🚢' },
        };

        function getRouteTypeInfo(typeId) {
            if (ROUTE_TYPES[typeId]) return ROUTE_TYPES[typeId];
            // Group by hundred
            const group = Math.floor(typeId / 100) * 100;
            if (ROUTE_TYPES[group]) return { ...ROUTE_TYPES[group], name: `${ROUTE_TYPES[group].name} (${typeId})` };
            return { name: `Type ${typeId}`, color: '#64748b', icon: '🚋' };
        }

        // ── Map Setup ──
        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'carto-dark': {
                        type: 'raster',
                        tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
                        tileSize: 256,
                        attribution: '© OpenStreetMap contributors, © CARTO',
                    },
                },
                layers: [{ id: 'carto-dark', type: 'raster', source: 'carto-dark' }],
            },
            center: [10.5, 49.0],
            zoom: 5,
        });
        map.addControl(new maplibregl.NavigationControl(), 'top-right');

        // ── File Upload ──
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');

        dropArea.addEventListener('click', () => fileInput.click());
        dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('dragover'); });
        dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            showLoading('Reading files...');
            const fileList = Array.from(files);

            // Check if it's a zip
            const zipFile = fileList.find(f => f.name.endsWith('.zip'));
            if (zipFile) {
                await loadFromZip(zipFile);
            } else {
                await loadFromTxtFiles(fileList);
            }
        }

        async function loadFromZip(file) {
            showLoading('Extracting ZIP...');
            const zip = await JSZip.loadAsync(file);
            const txtFiles = {};

            for (const [name, entry] of Object.entries(zip.files)) {
                if (entry.dir) continue;
                const basename = name.split('/').pop().toLowerCase();
                if (basename.endsWith('.txt') || basename.endsWith('.csv')) {
                    showLoading(`Reading ${basename}...`);
                    txtFiles[basename] = await entry.async('string');
                }
            }

            processGTFS(txtFiles);
        }

        async function loadFromTxtFiles(files) {
            const txtFiles = {};
            for (const file of files) {
                const name = file.name.toLowerCase();
                if (name.endsWith('.txt') || name.endsWith('.csv')) {
                    showLoading(`Reading ${name}...`);
                    txtFiles[name] = await file.text();
                }
            }
            processGTFS(txtFiles);
        }

        // ── CSV Parser ──
        function parseCSV(csvString) {
            const lines = csvString.trim().split('\n');
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').replace(/^\uFEFF/, ''));
            const rows = [];

            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let current = '';
                let inQuotes = false;

                for (const char of lines[i]) {
                    if (char === '"') { inQuotes = !inQuotes; }
                    else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                    else { current += char; }
                }
                values.push(current.trim());

                if (values.length >= headers.length) {
                    const row = {};
                    headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
                    rows.push(row);
                }
            }

            return rows;
        }

        // ── Process GTFS ──
        function processGTFS(files) {
            showLoading('Parsing routes...');

            gtfsData.agencies = files['agency.txt'] ? parseCSV(files['agency.txt']) : [];
            gtfsData.routes = files['routes.txt'] ? parseCSV(files['routes.txt']) : [];
            gtfsData.stops = files['stops.txt'] ? parseCSV(files['stops.txt']) : [];
            gtfsData.trips = files['trips.txt'] ? parseCSV(files['trips.txt']) : [];

            // We skip stop_times for performance (can be huge)
            // gtfsData.stopTimes = files['stop_times.txt'] ? parseCSV(files['stop_times.txt']) : [];

            if (files['shapes.txt']) {
                showLoading('Parsing shapes (this may take a moment)...');
                gtfsData.shapes = parseCSV(files['shapes.txt']);
            }

            showLoading('Building index...');

            // Build agency name map
            const agencyMap = {};
            gtfsData.agencies.forEach(a => {
                agencyMap[a.agency_id] = a.agency_name || a.agency_id;
            });

            // Enrich routes with agency name
            gtfsData.routes.forEach(r => {
                r._agency_name = agencyMap[r.agency_id] || r.agency_id || 'Unknown';
                r._route_type = parseInt(r.route_type) || 0;
                r._type_info = getRouteTypeInfo(r._route_type);
            });

            // Build filter options
            buildFilters();
            updateStats();
            updateMap();

            // Show UI
            document.getElementById('statsBar').style.display = 'grid';
            document.getElementById('filtersPanel').style.display = 'block';
            document.getElementById('actionBar').style.display = 'flex';
            hideLoading();
        }

        // ── Build Filters ──
        function buildFilters() {
            // Route types
            const typeCounts = {};
            gtfsData.routes.forEach(r => {
                const key = r._route_type;
                typeCounts[key] = (typeCounts[key] || 0) + 1;
                filters.routeType.add(key);
            });

            const typeContainer = document.getElementById('routeTypeFilters');
            typeContainer.innerHTML = '';

            Object.entries(typeCounts)
                .sort(([a], [b]) => parseInt(a) - parseInt(b))
                .forEach(([typeId, count]) => {
                    const info = getRouteTypeInfo(parseInt(typeId));
                    const item = document.createElement('label');
                    item.className = 'filter-item';
                    item.innerHTML = `
        <input type="checkbox" checked data-filter="routeType" data-value="${typeId}" onchange="handleFilterChange(this)">
        <span class="color-dot" style="background:${info.color}"></span>
        <span class="name">${info.icon} ${info.name}</span>
        <span class="count">${count.toLocaleString()}</span>
      `;
                    typeContainer.appendChild(item);
                });

            // Agencies
            const agencyCounts = {};
            gtfsData.routes.forEach(r => {
                const name = r._agency_name;
                agencyCounts[name] = (agencyCounts[name] || 0) + 1;
                filters.agency.add(name);
            });

            allAgencies = Object.entries(agencyCounts).sort(([a], [b]) => a.localeCompare(b));
            renderAgencyList(allAgencies);
        }

        function renderAgencyList(agencies) {
            const container = document.getElementById('agencyFilters');
            container.innerHTML = '';

            // Only show first 50 to avoid lag, with a "show more" prompt
            const toShow = agencies.slice(0, 80);

            toShow.forEach(([name, count]) => {
                const checked = filters.agency.has(name);
                const item = document.createElement('label');
                item.className = 'filter-item';
                item.innerHTML = `
      <input type="checkbox" ${checked ? 'checked' : ''} data-filter="agency" data-value="${name}" onchange="handleFilterChange(this)">
      <span class="name">${name}</span>
      <span class="count">${count.toLocaleString()}</span>
    `;
                container.appendChild(item);
            });

            if (agencies.length > 80) {
                const more = document.createElement('div');
                more.style.cssText = 'padding:8px 12px;font-size:0.8rem;color:var(--text-muted);text-align:center;';
                more.textContent = `+ ${agencies.length - 80} more (use search to find)`;
                container.appendChild(more);
            }
        }

        function filterAgencyList() {
            const q = document.getElementById('agencySearch').value.toLowerCase();
            if (!q) {
                renderAgencyList(allAgencies);
                return;
            }
            const filtered = allAgencies.filter(([name]) => name.toLowerCase().includes(q));
            renderAgencyList(filtered);
        }

        // ── Filter Handling ──
        function handleFilterChange(checkbox) {
            const filterType = checkbox.dataset.filter;
            const value = filterType === 'routeType' ? parseInt(checkbox.dataset.value) : checkbox.dataset.value;

            if (checkbox.checked) {
                filters[filterType].add(value);
            } else {
                filters[filterType].delete(value);
            }

            updateStats();
            updateMap();
        }

        function toggleAll(filterType, state) {
            const checkboxes = document.querySelectorAll(`input[data-filter="${filterType}"]`);
            if (state === true) {
                // If all are checked, uncheck all; otherwise check all
                const allChecked = Array.from(checkboxes).every(c => c.checked);
                checkboxes.forEach(c => {
                    c.checked = !allChecked;
                    const value = filterType === 'routeType' ? parseInt(c.dataset.value) : c.dataset.value;
                    if (!allChecked) filters[filterType].add(value);
                    else filters[filterType].delete(value);
                });
            }
            updateStats();
            updateMap();
        }

        // ── Stats ──
        function updateStats() {
            const filtered = getFilteredRoutes();
            document.getElementById('statRoutes').textContent = filtered.length.toLocaleString();
            document.getElementById('statStops').textContent = gtfsData.stops.length.toLocaleString();

            // Count trips for filtered routes
            const routeIds = new Set(filtered.map(r => r.route_id));
            const tripCount = gtfsData.trips.filter(t => routeIds.has(t.route_id)).length;
            document.getElementById('statTrips').textContent = tripCount.toLocaleString();
        }

        function getFilteredRoutes() {
            return gtfsData.routes.filter(r =>
                filters.routeType.has(r._route_type) &&
                filters.agency.has(r._agency_name)
            );
        }

        // ── Map Update ──
        function updateMap() {
            // Remove existing layers and sources
            ['stops-layer', 'stops-labels', 'shapes-layer'].forEach(id => {
                if (map.getLayer(id)) map.removeLayer(id);
            });
            ['stops-source', 'shapes-source'].forEach(id => {
                if (map.getSource(id)) map.removeSource(id);
            });

            const filteredRoutes = getFilteredRoutes();
            const filteredRouteIds = new Set(filteredRoutes.map(r => r.route_id));

            // ── Plot stops ──
            // Filter stops that belong to filtered routes (via trips → stop_times)
            // For performance, just show all stops if no stop_times loaded
            const stopFeatures = gtfsData.stops
                .filter(s => s.stop_lat && s.stop_lon)
                .slice(0, 10000) // Limit for performance
                .map(s => ({
                    type: 'Feature',
                    properties: {
                        name: s.stop_name || '',
                        id: s.stop_id || '',
                    },
                    geometry: {
                        type: 'Point',
                        coordinates: [parseFloat(s.stop_lon), parseFloat(s.stop_lat)],
                    },
                }));

            map.addSource('stops-source', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: stopFeatures },
            });

            map.addLayer({
                id: 'stops-layer',
                type: 'circle',
                source: 'stops-source',
                paint: {
                    'circle-radius': ['interpolate', ['linear'], ['zoom'], 4, 1.5, 8, 3, 12, 6],
                    'circle-color': '#3b82f6',
                    'circle-opacity': 0.6,
                    'circle-stroke-width': 0.5,
                    'circle-stroke-color': '#1e40af',
                },
            });

            map.addLayer({
                id: 'stops-labels',
                type: 'symbol',
                source: 'stops-source',
                minzoom: 10,
                layout: {
                    'text-field': ['get', 'name'],
                    'text-size': 11,
                    'text-offset': [0, 1.2],
                    'text-anchor': 'top',
                },
                paint: {
                    'text-color': '#94a3b8',
                    'text-halo-color': '#0a0e1a',
                    'text-halo-width': 1,
                },
            });

            // ── Plot shapes (if available) ──
            if (gtfsData.shapes.length > 0) {
                // Get shape_ids from filtered trips
                const filteredTrips = gtfsData.trips.filter(t => filteredRouteIds.has(t.route_id));
                const shapeIds = new Set(filteredTrips.map(t => t.shape_id).filter(Boolean));

                // Group shapes by shape_id
                const shapeGroups = {};
                gtfsData.shapes.forEach(s => {
                    if (!shapeIds.has(s.shape_id) && shapeIds.size > 0) return;
                    if (!shapeGroups[s.shape_id]) shapeGroups[s.shape_id] = [];
                    shapeGroups[s.shape_id].push([
                        parseFloat(s.shape_pt_lon),
                        parseFloat(s.shape_pt_lat),
                    ]);
                });

                // Build route → color map for shapes
                const tripRouteMap = {};
                filteredTrips.forEach(t => { tripRouteMap[t.shape_id] = t.route_id; });
                const routeColorMap = {};
                filteredRoutes.forEach(r => {
                    routeColorMap[r.route_id] = r.route_color ? `#${r.route_color}` : r._type_info.color;
                });

                const shapeFeatures = Object.entries(shapeGroups)
                    .filter(([, coords]) => coords.length >= 2)
                    .slice(0, 2000) // Limit for performance
                    .map(([shapeId, coords]) => ({
                        type: 'Feature',
                        properties: {
                            shapeId,
                            color: routeColorMap[tripRouteMap[shapeId]] || '#3b82f6',
                        },
                        geometry: { type: 'LineString', coordinates: coords },
                    }));

                if (shapeFeatures.length > 0) {
                    map.addSource('shapes-source', {
                        type: 'geojson',
                        data: { type: 'FeatureCollection', features: shapeFeatures },
                    });

                    map.addLayer({
                        id: 'shapes-layer',
                        type: 'line',
                        source: 'shapes-source',
                        paint: {
                            'line-color': ['get', 'color'],
                            'line-width': ['interpolate', ['linear'], ['zoom'], 4, 1, 8, 2, 12, 3],
                            'line-opacity': 0.7,
                        },
                    }, 'stops-layer');
                }
            }

            // ── Click handler ──
            map.on('click', 'stops-layer', (e) => {
                const f = e.features[0];
                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(`
        <div class="popup-title">${f.properties.name}</div>
        <div class="popup-detail">ID: ${f.properties.id}</div>
      `)
                    .addTo(map);
            });

            map.on('mouseenter', 'stops-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
            map.on('mouseleave', 'stops-layer', () => { map.getCanvas().style.cursor = ''; });
        }

        // ── Export ──
        function exportFilterConfig() {
            const config = {
                timestamp: new Date().toISOString(),
                filters: {
                    keep_route_types: Array.from(filters.routeType).sort((a, b) => a - b),
                    keep_agencies: Array.from(filters.agency).sort(),
                },
                stats: {
                    total_routes: gtfsData.routes.length,
                    filtered_routes: getFilteredRoutes().length,
                    total_stops: gtfsData.stops.length,
                },
            };

            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gtfs-filter-config-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function exportFilteredGTFS() {
            showLoading('Building filtered GTFS...');

            const filteredRoutes = getFilteredRoutes();
            const filteredRouteIds = new Set(filteredRoutes.map(r => r.route_id));

            // Filter trips
            const filteredTrips = gtfsData.trips.filter(t => filteredRouteIds.has(t.route_id));
            const filteredTripIds = new Set(filteredTrips.map(t => t.trip_id));

            // Build CSV from filtered data
            const zip = new JSZip();

            // Routes
            if (gtfsData.routes.length > 0) {
                const headers = Object.keys(gtfsData.routes[0]).filter(k => !k.startsWith('_'));
                const csv = [headers.join(',')];
                filteredRoutes.forEach(r => {
                    csv.push(headers.map(h => `"${(r[h] || '').replace(/"/g, '""')}"`).join(','));
                });
                zip.file('routes.txt', csv.join('\n'));
            }

            // Agencies (keep all referenced)
            if (gtfsData.agencies.length > 0) {
                const usedAgencies = new Set(filteredRoutes.map(r => r.agency_id));
                const filtered = gtfsData.agencies.filter(a => usedAgencies.has(a.agency_id));
                const headers = Object.keys(gtfsData.agencies[0]);
                const csv = [headers.join(',')];
                filtered.forEach(a => {
                    csv.push(headers.map(h => `"${(a[h] || '').replace(/"/g, '""')}"`).join(','));
                });
                zip.file('agency.txt', csv.join('\n'));
            }

            // Trips
            if (filteredTrips.length > 0) {
                const headers = Object.keys(gtfsData.trips[0]);
                const csv = [headers.join(',')];
                filteredTrips.forEach(t => {
                    csv.push(headers.map(h => `"${(t[h] || '').replace(/"/g, '""')}"`).join(','));
                });
                zip.file('trips.txt', csv.join('\n'));
            }

            showLoading('Generating ZIP...');
            const blob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gtfs-filtered-${Date.now()}.zip`;
            a.click();
            URL.revokeObjectURL(url);

            hideLoading();
        }

        // ── UI Helpers ──
        function showLoading(text) {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loadingText').textContent = text || 'Loading...';
        }
        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
