apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: motis-k8s-test
    trainscanner.test.mode: macro
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: __ACTIVE_DEADLINE_SECONDS__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: motis-k8s-test
        trainscanner.test.mode: macro
      annotations:
        trainscanner.test.tier: "__TIER__"
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      volumes:
        - name: scripts
          configMap:
            name: __SCRIPTS_CONFIGMAP__
            defaultMode: 493
        - name: work-host
          hostPath:
            path: "__WORK_HOST_DIR__"
            type: Directory
        - name: osm-host
          hostPath:
            path: "__OSM_HOST_DIR__"
            type: Directory
        - name: shared
          emptyDir: {}
      containers:
        - name: motis-runner
          image: "__MOTIS_IMAGE_REPO__:__MOTIS_IMAGE_TAG__"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "500m"
              memory: "4Gi"
              ephemeral-storage: "2Gi"
            limits:
              cpu: "2"
              memory: "12Gi"
              ephemeral-storage: "8Gi"
          command: ["/bin/sh", "/scripts/motis-job-runner.sh"]
          env:
            - name: WORK_DIR
              value: /work
            - name: GTFS_FILE
              value: /inputs/work/__GTFS_FILE_NAME__
            - name: OSM_FILE
              value: /inputs/osm/__OSM_FILE_NAME__
            - name: RESULT_FILE
              value: /work/test-result
            - name: SERVER_LOG
              value: /work/motis-server.log
            - name: TEST_TIMEOUT_SEC
              value: "__TEST_TIMEOUT_SEC__"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: work-host
              mountPath: /inputs/work
              readOnly: true
            - name: osm-host
              mountPath: /inputs/osm
              readOnly: true
            - name: shared
              mountPath: /work
        - name: tester
          image: "__TESTER_IMAGE_REPO__:__TESTER_IMAGE_TAG__"
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "2Gi"
          command: ["python3", "/scripts/test-motis-routes.py"]
          env:
            - name: MOTIS_TEST_MODE
              value: macro
            - name: MOTIS_BASE_URL
              value: http://127.0.0.1:8080
            - name: QUERY_FILE
              value: /inputs/work/__QUERY_FILE_NAME__
            - name: RESULT_FILE
              value: /work/test-result
            - name: REPORT_FILE
              value: /work/test-report.json
            - name: HEALTH_TIMEOUT_SEC
              value: "__HEALTH_TIMEOUT_SEC__"
            - name: REQUEST_TIMEOUT_SEC
              value: "20"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: work-host
              mountPath: /inputs/work
              readOnly: true
            - name: shared
              mountPath: /work
