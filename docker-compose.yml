services:
  motis:
    image: ${MOTIS_IMAGE:-ghcr.io/motis-project/motis:latest}
    container_name: motis
    restart: unless-stopped
    working_dir: /data
    ports:
      - "8080:8080"
    volumes:
      - ./data/motis:/data

  orchestrator:
    build:
      context: ./orchestrator
    container_name: orchestrator
    restart: unless-stopped
    depends_on:
      - motis
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CONFIG_DIR: /app/config
      STATE_DIR: /app/state
      DATA_DIR: /app/data
      FRONTEND_DIR: /app/frontend
      MOTIS_BASE_URL: http://motis:8080
      MOTIS_HEALTH_PATH: /health
      MOTIS_HEALTH_ACCEPT_404: "true"
      MOTIS_ROUTE_PATH: /api/v5/plan
      MOTIS_DATASET_TAG: active-gtfs
      MOTIS_RESTART_MODE: docker
      MOTIS_SKIP_HEALTHCHECK: "false"
      MOTIS_DOCKER_SOCKET_PATH: /var/run/docker.sock
      MOTIS_DOCKER_API_VERSION: auto
      MOTIS_CONTAINER_NAME: motis
      MOTIS_READY_TIMEOUT_MS: 180000
      MOTIS_HEALTH_POLL_INTERVAL_MS: 2000
    volumes:
      - ./frontend:/app/frontend:ro
      - ./config:/app/config
      - ./state:/app/state
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
