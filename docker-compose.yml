services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: trainscanner-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CANONICAL_DB_NAME:-trainscanner}
      POSTGRES_USER: ${CANONICAL_DB_USER:-trainscanner}
      POSTGRES_PASSWORD: ${CANONICAL_DB_PASSWORD:-trainscanner}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  motis:
    image: ${MOTIS_IMAGE:-ghcr.io/motis-project/motis:latest}
    container_name: motis
    restart: unless-stopped
    working_dir: /data
    ports:
      - "8080:8080"
    volumes:
      - ./data/motis:/data

  temporal-postgresql:
    image: postgres:14
    container_name: temporal-postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - POSTGRES_SEEDS=temporal-postgresql
    depends_on:
      - temporal-postgresql

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal-ui
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8082:8080"
    depends_on:
      - temporal

  ai-scoring:
    build:
      context: ./services/ai-scoring
    container_name: trainscanner-ai-scoring
    restart: unless-stopped
    ports:
      - "8000:8000"

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    depends_on:
      - motis
      - postgis
      - temporal
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CONFIG_DIR: /app/config
      STATE_DIR: /app/state
      DATA_DIR: /app/data
      FRONTEND_DIR: /app/frontend/dist
      MOTIS_BASE_URL: http://motis:8080
      MOTIS_HEALTH_PATH: /health
      MOTIS_HEALTH_ACCEPT_404: "true"
      MOTIS_ROUTE_PATH: /api/v5/plan
      MOTIS_DATASET_TAG: active-gtfs
      MOTIS_RESTART_MODE: docker
      MOTIS_SKIP_HEALTHCHECK: "false"
      MOTIS_DOCKER_SOCKET_PATH: /var/run/docker.sock
      MOTIS_DOCKER_API_VERSION: auto
      MOTIS_CONTAINER_NAME: motis
      MOTIS_READY_TIMEOUT_MS: 180000
      MOTIS_HEALTH_POLL_INTERVAL_MS: 2000
      CANONICAL_DB_MODE: direct
      CANONICAL_DB_HOST: trainscanner-postgis
      CANONICAL_DB_PORT: 5432
      CANONICAL_DB_USER: ${CANONICAL_DB_USER:-trainscanner}
      CANONICAL_DB_PASSWORD: ${CANONICAL_DB_PASSWORD:-trainscanner}
      CANONICAL_DB_NAME: ${CANONICAL_DB_NAME:-trainscanner}
      TEMPORAL_ADDRESS: temporal:7233
    volumes:
      - ./config:/app/config
      - ./services/orchestrator/state:/app/state
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgis_data:
  temporal_db_data:
