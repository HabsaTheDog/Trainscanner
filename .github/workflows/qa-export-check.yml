name: Canonical Export QA Check

on:
  push:
    paths:
      - ".github/workflows/qa-export-check.yml"
      - "scripts/qa/**"
      - "scripts/data/lib-db.sh"
      - "scripts/data/db-migrate.sh"
      - "db/migrations/**"
      - "config/gtfs-profiles.json"
      - "services/orchestrator/src/**"
      - "services/orchestrator/test/**"
      - "services/orchestrator/package.json"
  pull_request:
    paths:
      - ".github/workflows/qa-export-check.yml"
      - "scripts/qa/**"
      - "scripts/data/lib-db.sh"
      - "scripts/data/db-migrate.sh"
      - "db/migrations/**"
      - "config/gtfs-profiles.json"
      - "services/orchestrator/src/**"
      - "services/orchestrator/test/**"
      - "services/orchestrator/package.json"
  workflow_dispatch:

jobs:
  canonical-export-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Script + syntax checks
        run: |
          npm ci
          bash -n scripts/*.sh scripts/data/*.sh scripts/qa/*.sh
          python3 -m py_compile scripts/qa/export-canonical-gtfs.py
          npm run check:orchestrator

      - name: CSV fixture export determinism e2e
        run: node --test services/orchestrator/test/e2e/export-determinism.e2e.test.js
