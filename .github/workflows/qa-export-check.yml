name: Canonical Export QA Check

on:
  push:
    paths:
      - ".github/workflows/qa-export-check.yml"
      - "scripts/qa/**"
      - "scripts/data/lib-db.sh"
      - "scripts/data/db-migrate.sh"
      - "db/migrations/**"
      - "config/gtfs-profiles.json"
      - "orchestrator/src/**"
      - "orchestrator/package.json"
  pull_request:
    paths:
      - ".github/workflows/qa-export-check.yml"
      - "scripts/qa/**"
      - "scripts/data/lib-db.sh"
      - "scripts/data/db-migrate.sh"
      - "db/migrations/**"
      - "config/gtfs-profiles.json"
      - "orchestrator/src/**"
      - "orchestrator/package.json"
  workflow_dispatch:

jobs:
  canonical-export-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      CANONICAL_DB_MODE: docker-compose
      CANONICAL_DB_DOCKER_PROFILE: dach-data
      CANONICAL_DB_DOCKER_SERVICE: postgis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Script + syntax checks
        run: |
          bash -n scripts/*.sh scripts/data/*.sh scripts/qa/*.sh
          python3 -m py_compile scripts/qa/export-canonical-gtfs.py
          cd orchestrator
          npm run check

      - name: Seed fixture + export determinism check
        run: |
          scripts/qa/seed-export-fixture.sh --as-of 2026-01-15

          scripts/qa/build-profile.sh \
            --profile canonical_de_runtime \
            --as-of 2026-01-15 \
            --country DE \
            --output /tmp/active-gtfs-a.zip

          scripts/qa/build-profile.sh \
            --profile canonical_de_runtime \
            --as-of 2026-01-15 \
            --country DE \
            --output /tmp/active-gtfs-b.zip

          scripts/qa/validate-export.sh --zip /tmp/active-gtfs-a.zip

          HASH_A="$(sha256sum /tmp/active-gtfs-a.zip | awk '{print $1}')"
          HASH_B="$(sha256sum /tmp/active-gtfs-b.zip | awk '{print $1}')"

          echo "hash_a=$HASH_A"
          echo "hash_b=$HASH_B"

          test "$HASH_A" = "$HASH_B"

      - name: Cleanup docker compose services
        if: always()
        run: docker compose --profile dach-data down -v
