name: CI Nightly Full

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

jobs:
  full-quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CANONICAL_DB_MODE: docker-compose
      CANONICAL_DB_DOCKER_PROFILE: dach-data
      CANONICAL_DB_DOCKER_SERVICE: postgis
      ENABLE_POSTGIS_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax + config contract checks
        run: |
          bash -n scripts/*.sh scripts/ci/*.sh scripts/data/*.sh scripts/qa/*.sh
          python3 -m py_compile scripts/qa/export-canonical-gtfs.py scripts/data/netex_extract_stops.py
          scripts/validate-config.sh

      - name: Orchestrator full test suite
        run: |
          npm run check:orchestrator
          npm run test:orchestrator

      - name: CSV fixture export determinism e2e
        run: node --test services/orchestrator/test/e2e/export-determinism.e2e.test.js

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: reports/qa
          if-no-files-found: warn

      - name: Cleanup docker compose services
        if: always()
        run: docker compose --profile dach-data down -v
